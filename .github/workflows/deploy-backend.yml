name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'ingest/**'
      - 'pipeline/**'
      - 'ml/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'render.yaml'
      - '!.env'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Set DEEPSEEK_API_KEY on Render (if needed)
      - name: Set env vars on Render
        run: |
          RENDER_API_KEY="${{ secrets.RENDER_API_KEY }}"
          SERVICE_ID="srv-d701tin5r7bs73f3md10"

          echo "Setting DEEPSEEK_API_KEY on Render..."
          HTTP_STATUS=$(curl -s -w "%{http_code}" -o /dev/null -X PUT "https://api.render.com/v1/services/$SERVICE_ID/env-vars/DEEPSEEK_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d "{\"value\":\"${{ secrets.DEEPSEEK_API_KEY }}\"}")
          echo "DEEPSEEK_API_KEY response: HTTP $HTTP_STATUS"
          echo ""

      # Trigger deploy via Render API
      - name: Trigger Render deploy
        run: |
          RENDER_API_KEY="${{ secrets.RENDER_API_KEY }}"
          SERVICE_ID="srv-d701tin5r7bs73f3md10"
          echo "Triggering Render deploy..."
          RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d '{}')
          echo "Deploy response: $RESPONSE"
          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          echo "Deploy ID: $DEPLOY_ID"
          if [ -z "$DEPLOY_ID" ]; then
            echo "ERROR: No deploy ID returned"
            exit 1
          fi
          echo "✓ Deploy triggered: $DEPLOY_ID"

