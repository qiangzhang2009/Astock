name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'ingest/**'
      - 'pipeline/**'
      - 'ml/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'render.yaml'
      - '!.env'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set env vars and deploy to Render
        run: |
          RENDER_API_KEY="${{ secrets.RENDER_API_KEY }}"
          SERVICE_ID="srv-d701tin5r7bs73f3md10"
          
          # Set DEEPSEEK_API_KEY environment variable on Render
          echo "Setting DEEPSEEK_API_KEY on Render..."
          curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/env-vars" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d "{\"envVars\":[{\"key\":\"DEEPSEEK_API_KEY\",\"value\":\"${{ secrets.DEEPSEEK_API_KEY }}\"}]}"
          echo ""

      - name: Trigger Render deploy
        run: |
          RENDER_API_KEY="${{ secrets.RENDER_API_KEY }}"
          SERVICE_ID="srv-d701tin5r7bs73f3md10"
          echo "Triggering Render deploy..."
          RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d '{}')
          echo "Deploy response: $RESPONSE"
          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))")
          echo "Deploy ID: $DEPLOY_ID"
