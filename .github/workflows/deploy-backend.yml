name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'ingest/**'
      - 'pipeline/**'
      - 'ml/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'render.yaml'
      - '!.env'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Set DEEPSEEK_API_KEY on Render (if needed)
      - name: Set env vars on Render
        run: |
          RENDER_API_KEY="${{ secrets.RENDER_API_KEY }}"
          SERVICE_ID="srv-d701tin5r7bs73f3md10"

          echo "Setting DEEPSEEK_API_KEY on Render..."
          HTTP_STATUS=$(curl -s -w "%{http_code}" -o /dev/null --http1.1 \
            -X PUT "https://api.render.com/v1/services/$SERVICE_ID/env-vars/DEEPSEEK_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d "{\"value\":\"${{ secrets.DEEPSEEK_API_KEY }}\"}")
          echo "DEEPSEEK_API_KEY response: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "WARNING: DEEPSEEK_API_KEY update failed (this is OK if the key is already set)"
          fi
          echo ""

      # Trigger deploy via Render API
      - name: Trigger Render deploy
        run: |
          RENDER_API_KEY="${{ secrets.RENDER_API_KEY }}"
          SERVICE_ID="srv-d701tin5r7bs73f3md10"
          echo "Triggering Render deploy..."
          HTTP_STATUS=$(curl -s -w "%{http_code}" -o /tmp/render_deploy.json --http1.1 \
            -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d '{}')
          echo "Deploy HTTP status: $HTTP_STATUS"
          RESPONSE=$(cat /tmp/render_deploy.json 2>/dev/null)
          echo "Deploy response: $RESPONSE"
          if [ "$HTTP_STATUS" = "202" ] || [ "$HTTP_STATUS" = "200" ]; then
            DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
            echo "Deploy ID: $DEPLOY_ID"
            if [ -z "$DEPLOY_ID" ]; then
              echo "WARNING: HTTP 202 but no deploy ID found"
            else
              echo "✓ Deploy triggered: $DEPLOY_ID"
            fi
          else
            echo "ERROR: HTTP $HTTP_STATUS"
            exit 1
          fi

