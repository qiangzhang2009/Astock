name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'ingest/**'
      - 'pipeline/**'
      - 'ml/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'render.yaml'
      - '!.env'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set env vars and deploy to Render
        run: |
          RENDER_API_KEY="${{ secrets.RENDER_API_KEY }}"
          SERVICE_ID="srv-d701tin5r7bs73f3md10"

          echo "Setting DEEPSEEK_API_KEY on Render..."
          HTTP_STATUS=$(curl -s -w "%{http_code}" -o /dev/null -X POST "https://api.render.com/v1/services/$SERVICE_ID/env-vars" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d "{\"envVars\":[{\"key\":\"DEEPSEEK_API_KEY\",\"value\":\"${{ secrets.DEEPSEEK_API_KEY }}\"}]}")
          echo "DEEPSEEK env var response: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then echo "WARNING: DEEPSEEK_API_KEY update may have failed"; fi
          echo ""

      - name: Trigger Render deploy
        run: |
          RENDER_API_KEY="${{ secrets.RENDER_API_KEY }}"
          SERVICE_ID="srv-d701tin5r7bs73f3md10"
          echo "Triggering Render deploy..."
          HTTP_STATUS=$(curl -s -w "%{http_code}" -o /tmp/render_response.txt -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d '{}')
          echo "Deploy HTTP status: $HTTP_STATUS"
          echo "Response body: $(cat /tmp/render_response.txt)"
          if [ "$HTTP_STATUS" = "202" ] || [ "$HTTP_STATUS" = "200" ]; then
            echo "✓ Deploy triggered successfully"
          else
            echo "✗ Deploy trigger failed"
            exit 1
          fi
